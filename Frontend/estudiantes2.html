<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .badge-activo { background-color: #198754; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
        .badge-baja { background-color: #dc3545; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Estudiantes</h2>
            <button class="btn btn-primary" onclick="abrirModalCrear()"><i class="bi bi-plus-circle"></i> Nuevo</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="row mb-3 align-items-center">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="inputBusqueda" class="form-control" placeholder="Buscar..." onkeyup="buscarEstudiantes()">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check form-switch ms-3">
                            <input class="form-check-input" type="checkbox" id="switchInactivos" onchange="alternarInactivos()">
                            <label class="form-check-label text-muted" for="switchInactivos">Ver dados de baja</label>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>Documento</th><th>Apellido</th><th>Nombres</th><th>Email</th><th>Estado</th><th class="text-end">Acciones</th></tr>
                        </thead>
                        <tbody id="tablaEstudiantes"></tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span id="infoPaginacion" class="text-muted"></span>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm" onclick="cambiarPagina(-1)">Anterior</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="cambiarPagina(1)">Siguiente</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEstudiante" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="modalTitulo">Estudiante</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><form id="formEstudiante"><input type="hidden" id="estudianteId"><div class="mb-3"><label class="form-label">Documento</label><input type="number" class="form-control" id="documento" required></div><div class="row"><div class="col-md-6 mb-3"><label class="form-label">Apellido</label><input type="text" class="form-control" id="apellido" required></div><div class="col-md-6 mb-3"><label class="form-label">Nombres</label><input type="text" class="form-control" id="nombres" required></div></div><div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email" required></div><div class="mb-3"><label class="form-label">Fecha Nacimiento</label><input type="date" class="form-control" id="fechaNacimiento" required></div></form></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button><button type="button" class="btn btn-primary" onclick="guardarEstudiante()">Guardar</button></div></div></div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Detalle del Estudiante</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="detalleBody"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/estudiantes';
        const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZF91c3VhcmlvIjo2LCJub21icmVfdXN1YXJpbyI6ImFkbWluIiwiaWF0IjoxNzc4OTM3ODE2LCJleHAiOjE3Nzg5NjY2MTZ9.5L_TyErkkYAQR4qmoTvmCffHGykYDbcXfms2rkfld3E';
        let estado = { pagina: 1, limite: 10, busqueda: '', totalPaginas: 1, inactivos: false };

        const getHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` });

        const mostrarLoading = (visible) => {
            const tbody = document.getElementById('tablaEstudiantes');
            if (visible) tbody.innerHTML = '<tr><td colspan="6" class="text-center"><div class="spinner-border text-primary"></div></td></tr>';
        };

        const cargarEstudiantes = async () => {
            mostrarLoading(true);
            try {
                const url = `${API_URL}?pagina=${estado.pagina}&limite=${estado.limite}&busqueda=${estado.busqueda}&inactivos=${estado.inactivos}`;
                const respuesta = await fetch(url, { headers: getHeaders() });
                const datos = await respuesta.json();
                estado.totalPaginas = datos.totalPaginas || 1;
                renderizarTabla(datos.datos || []);
                document.getElementById('infoPaginacion').textContent = `Pág ${datos.pagina} de ${datos.totalPaginas} (Total: ${datos.total})`;
            } catch (e) { alert('Error al cargar.'); }
        };

        const renderizarTabla = (estudiantes) => {
            const tbody = document.getElementById('tablaEstudiantes');
            tbody.innerHTML = '';
            estudiantes.forEach(est => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${est.documento}</td><td>${est.apellido}</td><td>${est.nombres}</td><td>${est.email}</td><td>${est.activo == 1 ? '<span class="badge-activo">Activo</span>' : '<span class="badge-baja">Inactivo</span>'}</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-info me-1" onclick="verDetalle(${est.id_estudiante})"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editarEstudiante(${est.id_estudiante})"><i class="bi bi-pencil"></i></button>
                    ${est.activo == 1 ? `<button class="btn btn-sm btn-outline-danger" onclick="darDeBaja(${est.id_estudiante})"><i class="bi bi-trash"></i></button>` : `<button class="btn btn-sm btn-outline-success" onclick="restaurar(${est.id_estudiante})"><i class="bi bi-arrow-counterclockwise"></i></button>`}
                </td>`;
                tbody.appendChild(tr);
            });
        };

        const verDetalle = async (id) => {
            const resp = await fetch(`${API_URL}/${id}`, { headers: getHeaders() });
            const est = await resp.json();
            document.getElementById('detalleBody').innerHTML = `<p><strong>DNI:</strong> ${est.documento}</p><p><strong>Nombre:</strong> ${est.apellido}, ${est.nombres}</p><p><strong>Email:</strong> ${est.email}</p><p><strong>Fecha Nac:</strong> ${est.fecha_nacimiento?.split('T')[0] || 'N/A'}</p>`;
            new bootstrap.Modal(document.getElementById('modalDetalle')).show();
        };

        // --- Funciones de control (sin cambios, mantienen lo anterior) ---
        const buscarEstudiantes = () => { clearTimeout(window.t); window.t = setTimeout(() => { estado.pagina = 1; cargarEstudiantes(); }, 500); };
        const alternarInactivos = () => { estado.inactivos = document.getElementById('switchInactivos').checked; estado.pagina = 1; cargarEstudiantes(); };
        const cambiarPagina = (dir) => { if ((estado.pagina + dir) >= 1 && (estado.pagina + dir) <= estado.totalPaginas) { estado.pagina += dir; cargarEstudiantes(); } };
        const abrirModalCrear = () => { document.getElementById('formEstudiante').reset(); new bootstrap.Modal(document.getElementById('modalEstudiante')).show(); };
        
        const guardarEstudiante = async () => {
            const id = document.getElementById('estudianteId').value;
            const datos = { documento: document.getElementById('documento').value, apellido: document.getElementById('apellido').value, nombres: document.getElementById('nombres').value, email: document.getElementById('email').value, fecha_nacimiento: document.getElementById('fechaNacimiento').value, id_usuario_modificacion: 1 };
            await fetch(id ? `${API_URL}/${id}` : API_URL, { method: id ? 'PUT' : 'POST', headers: getHeaders(), body: JSON.stringify(datos) });
            bootstrap.Modal.getInstance(document.getElementById('modalEstudiante')).hide();
            cargarEstudiantes();
        };

        const darDeBaja = async (id) => { if(confirm('¿Baja?')) { await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: getHeaders() }); cargarEstudiantes(); } };
        const restaurar = async (id) => { await fetch(`${API_URL}/${id}/activar`, { method: 'PATCH', headers: getHeaders() }); cargarEstudiantes(); };
        const editarEstudiante = async (id) => {
            try {
                const respuesta = await fetch(`${API_URL}/${id}`, { headers: getHeaders() });
                const est = await respuesta.json();
                
                // Si el servidor devolvió un error (ej: 404), esto lo corta acá
                if (!respuesta.ok) throw new Error('Error al obtener datos');

                // DEBUG: Si te sale "undefined" en la pantalla, abrí la consola (F12) 
                // y mirá qué dice acá:
                console.log("Datos recibidos para editar:", est);

                // Llenamos el formulario
                document.getElementById('estudianteId').value = est.id_estudiante || '';
                document.getElementById('documento').value = est.documento || '';
                document.getElementById('apellido').value = est.apellido || '';
                document.getElementById('nombres').value = est.nombres || '';
                document.getElementById('email').value = est.email || '';
                
                // Manejo de fecha
                if (est.fecha_nacimiento) {
                    document.getElementById('fechaNacimiento').value = est.fecha_nacimiento.split('T')[0];
                }

                document.getElementById('modalTitulo').textContent = 'Editar Estudiante';
                new bootstrap.Modal(document.getElementById('modalEstudiante')).show();
            } catch (error) {
                console.error("Error al editar:", error);
                alert('No se pudo obtener la información del estudiante para editar.');
            }
        };
        cargarEstudiantes();
    </script>
</body>
</html>
